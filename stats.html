<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stats</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G8XQHBWBCK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G8XQHBWBCK');
  </script>
  <link rel="stylesheet" href="styles/page-chrome.css">
  <link rel="stylesheet" href="styles/stats-page.css">
</head>
<body>
  <header>
    <div class="header-copy">
      <div class="header-main">
        <h1>Stats</h1>
        <div class="header-links">
          <a href="index.html" class="nav-link">Consume</a>
          <a href="tv.html" class="nav-link">TV</a>
          <a href="anime.html" class="nav-link">Anime</a>
          <a href="recommendations.html" class="nav-link">Recommendations</a>
        </div>
      </div>
      <p>The same basic numbers from the main page, just laid out a little more clearly.</p>
    </div>
  </header>

  <main>
    <div class="stats-sheet">
      <section class="stats-group">
        <div class="group-label">By Year</div>
        <div class="yearly-chart" id="yearly-chart"></div>
      </section>

      <div class="stats-divider"></div>

      <section class="stats-group">
        <div class="group-label">Hours</div>
        <div class="hours-chart" id="hours-chart"></div>
      </section>

      <div class="stats-divider"></div>

      <section class="stats-group">
        <div class="group-label">Time</div>
        <div class="header-stats" id="time-stats"></div>
      </section>

      <div class="stats-divider"></div>

      <section class="stats-group">
        <div class="group-label">Value</div>
        <div class="header-stats" id="value-stats"></div>
      </section>

      <p class="note">Reading is estimated from page counts. Movie, anime, and TV totals come from runtime data.</p>
    </div>
  </main>

  <script src="stats_data.js"></script>
  <script src="scripts/stats-page.js"></script>
