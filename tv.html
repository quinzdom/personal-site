<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tv</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-G8XQHBWBCK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-G8XQHBWBCK');
  </script>
  <link rel="stylesheet" href="styles/page-chrome.css">
  <link rel="stylesheet" href="styles/media-grid-page.css">
</head>
<body>
  <header>
    <div class="header-copy">
      <div class="header-main">
        <h1>TV I've Seen</h1>
      </div>
      <div class="header-subline">
        <p id="count"></p>
        <div class="header-links">
          <a href="index.html" class="nav-link">Home</a>
        </div>
      </div>
    </div>
    <div class="toolbar">
      <div class="toolbar-section">
        <div class="toolbar-label">Sort</div>
        <div class="sort-toggle" aria-label="TV sort mode">
          <button class="active" data-sort="source">Source</button>
          <button data-sort="recent">Newest</button>
        </div>
      </div>
      <div class="toolbar-section">
        <div class="toolbar-label">Search</div>
        <input class="search-input" id="search-input" type="text" placeholder="Search..." aria-label="Search TV titles">
      </div>
    </div>
  </header>

  <div class="grid" id="grid"></div>
  <div class="empty-state" id="empty-state" hidden>No TV shows matched that search.</div>

  <script src="tv_data.js"></script>
  <script src="scripts/page-utils.js"></script>
  <script src="scripts/tv-page.js"></script>
</body>
</html>
