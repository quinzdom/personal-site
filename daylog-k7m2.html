<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>day log</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <link rel="stylesheet" href="styles/page-chrome.css">
  <style>
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 24px 48px;
    }

    .entry-date {
      color: #7f92a4;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .day-notes {
      margin: 0;
      padding-left: 1.5rem;
      color: #dbe4ed;
    }

    .day-notes li {
      line-height: 1.5;
      font-size: 0.98rem;
      padding-left: 0.4rem;
    }

    .day-notes li + li {
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      main {
        padding: 8px 16px 40px;
      }

      .day-notes li {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-copy">
      <div class="header-main">
        <h1>day log</h1>
      </div>
      <div class="header-subline">
        <p>private notes</p>
      </div>
    </div>
  </header>

  <main>
    <p class="entry-date">April 3, 2026</p>
    <ul class="day-notes">
      <li>Read <em>Chainsaw Man</em> volumes 13-20 (roughly).</li>
      <li>Went out drinking with K.</li>
    </ul>
  </main>
</body>
</html>
