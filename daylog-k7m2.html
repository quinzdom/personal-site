<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日々の記録</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <link rel="stylesheet" href="styles/page-chrome.css">
  <style>
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 24px 48px;
    }

    .log-entry + .log-entry {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(64, 76, 89, 0.42);
    }

    .entry-date {
      color: #7f92a4;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .auto-note {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 14px;
      color: #b6c2ce;
    }

    .auto-note-label {
      color: #6d8091;
      font-size: 0.58rem;
      letter-spacing: 0.08em;
    }

    .auto-note-copy {
      color: #cad4de;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .note-text {
      display: block;
    }

    .note-estimate {
      margin-top: 6px;
      color: #8ea0b1;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .day-notes {
      margin: 0;
      padding-left: 1.5rem;
      color: #dbe4ed;
    }

    .day-notes li {
      line-height: 1.5;
      font-size: 0.98rem;
      padding-left: 0.4rem;
    }

    .day-notes li + li {
      margin-top: 8px;
    }

    .log-composer {
      max-width: 560px;
      margin: 0 auto 32px;
      padding: 0 24px;
    }

    .log-composer-form {
      display: grid;
      gap: 8px;
    }

    .log-composer-copy {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      color: #8fa0b1;
      font-size: 0.72rem;
      letter-spacing: 0.03em;
    }

    .log-composer-copy p {
      margin: 0;
    }

    .log-composer-model {
      color: #6f8293;
      white-space: nowrap;
    }

    .log-composer-input {
      min-height: 72px;
      resize: vertical;
      border: 1px solid rgba(88, 102, 118, 0.42);
      border-radius: 12px;
      padding: 11px 13px;
      background: rgba(17, 24, 31, 0.42);
      color: #e3ebf3;
      font: inherit;
      line-height: 1.5;
    }

    .log-composer-input::placeholder {
      color: #758697;
    }

    .log-composer-input:focus {
      outline: none;
      border-color: rgba(151, 170, 188, 0.68);
      background: rgba(19, 26, 34, 0.58);
    }

    .log-composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .log-composer-status {
      min-height: 1.2rem;
      margin: 0;
      color: #90a2b4;
      font-size: 0.72rem;
      letter-spacing: 0.02em;
    }

    .log-composer-status[data-state="error"] {
      color: #c58585;
    }

    .log-composer-status[data-state="success"] {
      color: #9ab99a;
    }

    .log-composer-submit {
      border: 1px solid rgba(92, 106, 121, 0.48);
      border-radius: 999px;
      padding: 7px 14px;
      background: rgba(20, 28, 36, 0.5);
      color: #d8e1ea;
      font: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: border-color 140ms ease, background 140ms ease, color 140ms ease;
    }

    .log-composer-submit:hover:not(:disabled) {
      border-color: rgba(145, 160, 176, 0.7);
      background: rgba(27, 37, 46, 0.72);
    }

    .log-composer-submit:disabled {
      cursor: default;
      opacity: 0.55;
    }

    @media (max-width: 640px) {
      .log-composer {
        padding: 0 16px;
      }

      main {
        padding: 8px 16px 40px;
      }

      .log-composer-copy,
      .log-composer-actions {
        display: grid;
        gap: 6px;
      }

      .day-notes li {
        font-size: 0.94rem;
      }

      .note-estimate {
        font-size: 0.74rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-copy">
      <div class="header-main">
        <h1>日々の記録</h1>
      </div>
      <div class="header-subline">
        <p>個人メモ</p>
      </div>
    </div>
  </header>

  <main id="day-log"></main>

  <section class="log-composer" aria-label="AI入力">
    <form id="daylog-input-form" class="log-composer-form">
      <div class="log-composer-copy">
        <p>自然文のまま書けば、GPT-5.4 が日録用に整えて反映します。</p>
        <span id="daylog-model" class="log-composer-model">GPT-5.4</span>
      </div>
      <textarea
        id="daylog-input"
        class="log-composer-input"
        name="input"
        placeholder="例: 今日は火花を少し読んだ。夜はかなりだるかった。"
      ></textarea>
      <div class="log-composer-actions">
        <p id="daylog-input-status" class="log-composer-status" aria-live="polite"></p>
        <button id="daylog-submit" class="log-composer-submit" type="submit">記録する</button>
      </div>
    </form>
  </section>

  <script src="daylog_data.js?v=20260406g"></script>
  <script src="scripts/daylog-page.js?v=20260406g"></script>
</body>
</html>
