<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>day log</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <link rel="stylesheet" href="styles/page-chrome.css">
  <style>
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 8px 24px 48px;
    }

    .log-entry + .log-entry {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(64, 76, 89, 0.42);
    }

    .entry-date {
      color: #7f92a4;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .auto-note {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      margin: 0 0 14px;
      color: #b6c2ce;
    }

    .auto-note-label {
      color: #6d8091;
      font-size: 0.5rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .auto-note-copy {
      color: #cad4de;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .day-notes {
      margin: 0;
      padding-left: 1.5rem;
      color: #dbe4ed;
    }

    .day-notes li {
      line-height: 1.5;
      font-size: 0.98rem;
      padding-left: 0.4rem;
    }

    .day-notes li + li {
      margin-top: 8px;
    }

    @media (max-width: 640px) {
      main {
        padding: 8px 16px 40px;
      }

      .day-notes li {
        font-size: 0.94rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-copy">
      <div class="header-main">
        <h1>day log</h1>
      </div>
      <div class="header-subline">
        <p>private notes</p>
      </div>
    </div>
  </header>

  <main id="day-log"></main>

  <script src="daylog_data.js"></script>
  <script src="scripts/daylog-page.js"></script>
</body>
</html>
