    body {

      min-height: 100vh;
    }

    header {
      max-width: 1200px;
      margin: 10px auto 8px;
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
      position: relative;
    }

    .header-copy {
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      z-index: 1;
      order: 1;
    }

    .header-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    header h1 {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1;
      white-space: nowrap;
    }

    header p {
      margin-top: 3px;
      font-size: 0.6rem;
      color: #718191;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .recommendations-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(70, 84, 98, 0.76);
      border-radius: 999px;
      background: rgba(237, 242, 247, 0.04);
      color: #728292;
      text-decoration: none;
      padding: 4px 9px;
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      transform: translateY(1px);
      transition: color 0.15s, border-color 0.15s, background 0.15s, transform 0.15s;
    }

    .recommendations-link:hover {
      color: #f1f4f7;
      border-color: rgba(99, 115, 129, 0.6);
      background: rgba(237, 242, 247, 0.08);
      transform: translateY(0);
    }

    .header-links {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .site-footer {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 24px 48px;
    }

    .footer-credit {
      margin-top: 20px;
      text-align: center;
      font-size: 0.6rem;
      color: #667787;
      letter-spacing: 0.08em;
    }

    body.full-width .site-footer {
      display: none;
    }

    .header-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 18px;
      justify-content: center;
      align-items: baseline;
    }

    .header-stat {
      display: flex;
      flex-direction: row;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
      white-space: nowrap;
      padding: 2px 0;
    }

    .header-stat-value {
      color: #e4ebf2;
      font-size: 0.72rem;
      line-height: 1;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .header-stat-label {
      color: #667787;
      font-size: 0.46rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .header-stat-meta {
      color: #8fa0af;
      font-size: 0.62rem;
      line-height: 1;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .toolbar {
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      row-gap: 6px;
      position: relative;
      z-index: 1;
      order: 2;
    }

    .toolbar-section {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 7px;
    }

    .toolbar-label {
      color: #667787;
      font-size: 0.46rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .search-input {
      border: 1px solid rgba(56, 67, 79, 0.9);
      border-radius: 999px;
      background: rgba(18, 24, 30, 0.62);
      color: #d6dee7;
      padding: 5px 12px;
      font-size: 0.66rem;
      letter-spacing: 0.03em;
      font-family: inherit;
      outline: none;
      width: 110px;
      max-width: 180px;
      transition: width 0.25s ease, border-color 0.15s;
    }

    .search-input:focus,
    .search-input.has-value {
      width: 160px;
      border-color: rgba(99, 115, 129, 0.6);
    }

    .search-input::placeholder {
      color: #556677;
      letter-spacing: 0.08em;
    }

    .search-trigger {
      display: none;
    }

    .music-btn {
      border: 1px solid rgba(56, 67, 79, 0.9);
      border-radius: 999px;
      background: rgba(18, 24, 30, 0.62);
      color: #667787;
      padding: 5px 11px;
      font-size: 0.66rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .music-btn:hover {
      color: #d6dee7;
      border-color: rgba(99, 115, 129, 0.6);
    }

    .music-btn.playing {
      color: #d6dee7;
      border-color: rgba(99, 115, 129, 0.5);
    }

    .filters {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px;
      border: 1px solid rgba(56, 67, 79, 0.9);
      border-radius: 999px;
      background: rgba(18, 24, 30, 0.62);
    }

    .filters button {
      border: 0;
      background: transparent;
      color: #93a4b3;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.66rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .filters button:hover {
      color: #d6dee7;
    }

    .filters button.active {
      background: rgba(237, 242, 247, 0.08);
      color: #f1f4f7;
      box-shadow: inset 0 0 0 1px rgba(160, 177, 193, 0.16);
      font-weight: 600;
    }

    .view-toggle,
    .layout-toggle,
    .language-toggle,
    .favorites-toggle {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px;
      border: 1px solid rgba(56, 67, 79, 0.9);
      border-radius: 999px;
      background: rgba(18, 24, 30, 0.62);
    }

    .view-toggle button,
    .layout-toggle button,
    .language-toggle button,
    .favorites-toggle button {
      border: 0;
      background: transparent;
      color: #8393a2;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.64rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .view-toggle button:hover,
    .layout-toggle button:hover,
    .language-toggle button:hover,
    .favorites-toggle button:hover {
      color: #d6dee7;
    }

    .view-toggle button.active,
    .layout-toggle button.active,
    .language-toggle button.active,
    .favorites-toggle button.active {
      background: rgba(237, 242, 247, 0.08);
      color: #f1f4f7;
      box-shadow: inset 0 0 0 1px rgba(160, 177, 193, 0.16);
    }

    .language-toggle button[data-language="japanese"].active {
      background: linear-gradient(180deg, #d24a66, #bc002d);
      color: #fff7f8;
      box-shadow: inset 0 0 0 1px rgba(255, 226, 232, 0.18);
    }

    .grid {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(105px, 1fr));
      gap: 8px;
      align-items: start;
    }

    body.full-width {
      overflow-x: hidden;
    }

    body.full-width header {
      display: none;
    }

    body.full-width .grid {
      max-width: none;
      width: 100vw;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }

    .fullscreen-exit {
      display: none;
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      border: 0;
      border-radius: 999px;
      background: rgba(20, 24, 28, 0.82);
      color: #d9e2ea;
      padding: 8px 12px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: inset 0 0 0 1px rgba(119, 136, 153, 0.24);
      backdrop-filter: blur(10px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.1s ease, background 0.18s ease, color 0.18s ease;
    }

    .fullscreen-exit:hover {
      background: rgba(26, 31, 36, 0.92);
      color: #fff;
    }

    body.full-width .fullscreen-exit {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 1;
      pointer-events: auto;
    }

    body.full-width.idle-ui .fullscreen-exit {
      opacity: 0.14;
    }

    @keyframes nudge {
      0%   { opacity: 0.14; transform: scale(1); }
      35%  { opacity: 0.85; transform: scale(1.08); }
      100% { opacity: 0.14; transform: scale(1); }
    }

    body.full-width.idle-ui .fullscreen-exit.nudge {
      animation: nudge 2s ease;
    }

    .entry {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .month-marker {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: #678;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .month-marker:first-child {
      margin-top: 0;
    }

    .month-marker::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(82, 99, 115, 0.7), rgba(82, 99, 115, 0));
    }

    .item {
      position: relative;
      aspect-ratio: 2/3;
      border-radius: 4px;
      overflow: hidden;
      background: #1f2830;
      cursor: pointer;
    }

    .item-period {
      min-height: 0.75rem;
      padding-left: 2px;
      color: #5f6d7c;
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 0.2s;
    }

    .item:hover img {
      opacity: 0.3;
    }

    .item .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: end;
      padding: 10px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .item:hover .overlay {
      opacity: 1;
    }

    .overlay .title {
      color: #fff;
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .overlay .author {
      color: #99aabb;
      font-size: 0.65rem;
      margin-top: 2px;
    }

    .overlay .date {
      color: #678;
      font-size: 0.58rem;
      margin-top: 2px;
    }

    .liked-heart {
      position: absolute;
      top: 5px;
      right: 5px;
      color: #ff4466;
      font-size: 1rem;
      line-height: 1;
      opacity: 1;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0, 0, 0, 0.7), 0 0 2px rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    .no-cover {
      display: flex;
      align-items: end;
      justify-content: start;
      width: 100%;
      height: 100%;
      background: #2a2420;
      padding: 12px;
      text-align: left;
      font-size: 0.85rem;
      font-weight: 600;
      color: #d4c4b0;
      line-height: 1.25;
      letter-spacing: -0.01em;
      border: 1px solid #3d332a;
    }

    @media (max-width: 600px) {
      header {
        margin: 10px 16px 14px;
        padding: 8px 0;
        gap: 12px;
      }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
        gap: 6px;
      }
      .toolbar {
        align-items: flex-start;
      }
      .header-main {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        align-self: flex-start;
      }
      .header-links {
        justify-content: flex-start;
      }
      header h1 {
        font-size: 1.15rem;
        white-space: normal;
      }
      .site-footer {
        padding: 20px 16px 32px;
      }
      .toolbar-section {
        flex-wrap: wrap;
        gap: 5px 7px;
      }
      .grid { padding: 0 16px 32px; }
      .filters,
      .view-toggle,
      .layout-toggle,
      .language-toggle,
      .favorites-toggle {
        flex-wrap: wrap;
      }
      .filters button,
      .view-toggle button,
      .layout-toggle button,
      .language-toggle button,
      .favorites-toggle button {
        padding: 5px 9px;
      }

  <header>
    <div class="toolbar">
      <div class="toolbar-section">
        <div class="toolbar-label">Show</div>
        <div class="filters">
          <button class="active" data-filter="all">All</button>
          <button data-filter="book">Books</button>
          <button data-filter="movie">Movies</button>
          <button data-filter="anime">Anime</button>
        </div>
      </div>
      <div class="toolbar-section">
        <div class="toolbar-label">View</div>
        <div class="view-toggle" aria-label="Sort view">
          <button class="active" data-view="timeline">Timeline</button>
          <button data-view="month">By Month</button>
        </div>
      </div>
      <div class="toolbar-section">
        <div class="toolbar-label">Focus</div>
        <div class="favorites-toggle" aria-label="Favorites filter">
          <button class="active" data-favorites="all">All</button>
          <button data-favorites="favorites">Favorites</button>
        </div>
      </div>
      <div class="toolbar-section">
        <div class="toolbar-label">Language</div>
        <div class="language-toggle" aria-label="Language filter">
          <button class="active" data-language="all">All</button>
          <button data-language="english">English</button>
          <button data-language="japanese">Japanese</button>
        </div>
      </div>
      <div class="toolbar-section">
        <div class="toolbar-label">Mode</div>
        <div class="layout-toggle" aria-label="Presentation mode">
          <button data-layout="full">Aesthetic</button>
        </div>
      </div>
      <div class="toolbar-section">
        <button class="music-btn" id="music-btn" type="button">♩ noise</button>
      </div>
      <div class="toolbar-section">
        <button class="search-trigger" id="search-trigger" type="button" aria-label="Search">&#x2315;</button>
        <input class="search-input" id="search-input" type="text" placeholder="Search..." aria-label="Search titles" />
      </div>
    </div>
    <div class="header-copy">
      <div class="header-main">
        <h1>Books & Movies I consumed</h1>
        <div class="header-links">
          <a href="stats.html" class="recommendations-link">Stats</a>
          <a href="recommendations.html" class="recommendations-link">Recommendations</a>
        </div>
      </div>
      <p id="count"></p>
    </div>
  </header>
  <audio id="chaconne" src="chaconne.mp3" preload="none"></audio>
  <button class="fullscreen-exit" id="fullscreen-exit" type="button">Back To UI</button>
  <div class="grid" id="grid"></div>
  <footer class="site-footer">
    <div class="header-stats" aria-label="Consumption stats">
      <div class="header-stat">
        <span class="header-stat-label">Reading</span>
        <span class="header-stat-value" id="reading-hours">--</span>
        <span class="header-stat-meta" id="reading-days">--</span>
      </div>
      <div class="header-stat">
        <span class="header-stat-label">Watching</span>
        <span class="header-stat-value" id="watching-hours">--</span>
        <span class="header-stat-meta" id="watching-days">--</span>
      </div>
      <div class="header-stat">
        <span class="header-stat-label">Total</span>
        <span class="header-stat-value" id="total-hours">--</span>
        <span class="header-stat-meta" id="total-days">--</span>
      </div>
      <div class="header-stat">
        <span class="header-stat-label">Min Wage</span>
        <span class="header-stat-value" id="minimum-wage-value">--</span>
        <span class="header-stat-meta" id="minimum-wage-rate">--</span>
      </div>
      <div class="header-stat">
        <span class="header-stat-label">Avg Wage</span>
        <span class="header-stat-value" id="average-wage-value">--</span>
        <span class="header-stat-meta" id="average-wage-rate">--</span>
      </div>
    </div>
    <p class="footer-credit">Music: Bach's Chaconne arranged for the left hand by Brahms, played by Leon Fleisher.</p>
  </footer>

  <script src="likes_data.js"></script>

      'lb-https://boxd.it/sv94',
      'lb-https://boxd.it/uRS',
      'lb-https://boxd.it/vfZ0',
      'lb-https://boxd.it/ViK',
      'lb-https://boxd.it/XXA',
      'lb-https://boxd.it/Y5u',
      'lb-https://boxd.it/yzY8',
      'lb-https://boxd.it/yZYe',
    ]);
    let activeFilter = 'all';
    let activeView = localStorage.getItem(STORAGE_KEY) || 'timeline';
    let activeLayout = localStorage.getItem(LAYOUT_STORAGE_KEY) || 'full';
    let activeLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY) || 'all';
    let activeFavorites = localStorage.getItem(FAVORITES_STORAGE_KEY) || 'all';
    let activeSearch = '';
    let fullscreenIdleTimer = null;

    function normalizeAnimeItem(item) {
      const subtitleBits = [];

      if (item.entry_count > 1) {
        subtitleBits.push(`${item.entry_count} entries`);
      }

      if (item.type) {
        subtitleBits.push(item.type);
      }

      if (subtitleBits.length < 2 && item.studio) {
        subtitleBits.push(item.studio);
      } else if (subtitleBits.length === 0 && item.english_title) {
        subtitleBits.push(item.english_title);
      }

      return {
        id: item.id,
        title: item.title,
        author: subtitleBits.join(' · ') || item.english_title || item.studio || 'Anime',
        cover: item.cover,
        type: 'anime',
        date_read: item.date_completed || '',
        rating: 0,
        ya: false,
      };
    }

    const siteItems = items.concat(
      typeof animeItems === 'undefined' ? [] : animeItems.map(normalizeAnimeItem)
    );

    function clearFullscreenIdleTimer() {
      if (fullscreenIdleTimer) {
        window.clearTimeout(fullscreenIdleTimer);
        fullscreenIdleTimer = null;
      }
    }

    function scheduleFullscreenIdleFade() {
      clearFullscreenIdleTimer();
      if (activeLayout !== 'full') return;
      fullscreenIdleTimer = window.setTimeout(() => {
        document.body.classList.add('idle-ui');
      }, 3200);
    }

    function bumpFullscreenExitVisibility() {
      if (activeLayout !== 'full') return;
      document.body.classList.remove('idle-ui');
      scheduleFullscreenIdleFade();
    }

    function applyLayout(layout = activeLayout) {
      activeLayout = layout;
      document.body.classList.toggle('full-width', layout === 'full');
      document.body.classList.remove('idle-ui');
      clearFullscreenIdleTimer();
      if (layout === 'full') {
        scheduleFullscreenIdleFade();
      }
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        maximumFractionDigits: 0,
      }).format(value);
    }

    function renderHeaderStats() {
      const readingValue = document.getElementById('reading-hours');
      const watchingValue = document.getElementById('watching-hours');
      const totalValue = document.getElementById('total-hours');
      const readingDays = document.getElementById('reading-days');
      const watchingDays = document.getElementById('watching-days');
      const totalDays = document.getElementById('total-days');
      const minimumWageValue = document.getElementById('minimum-wage-value');
      const minimumWageRate = document.getElementById('minimum-wage-rate');
      const averageWageValue = document.getElementById('average-wage-value');
      const averageWageRate = document.getElementById('average-wage-rate');

      if (typeof stats === 'undefined') {
        readingValue.textContent = '--';
        watchingValue.textContent = '--';
        totalValue.textContent = '--';
        readingDays.textContent = '--';
        watchingDays.textContent = '--';
        totalDays.textContent = '--';
        minimumWageValue.textContent = '--';
        minimumWageRate.textContent = '--';
        averageWageValue.textContent = '--';
        averageWageRate.textContent = '--';
        return;
      }

      readingValue.textContent = `~${stats.readingHours}h`;
      watchingValue.textContent = `${stats.watchingHours}h`;
      totalValue.textContent = `~${stats.totalHours}h`;
      readingDays.textContent = `~${stats.readingDays} days`;
      watchingDays.textContent = `~${stats.watchingDays} days`;
      totalDays.textContent = `~${stats.totalDays} days`;
      minimumWageValue.textContent = `~${formatCurrency(stats.minimumWageValue)}`;
      minimumWageRate.textContent = `$${stats.minimumWageHourly}/hr`;
      averageWageValue.textContent = `~${formatCurrency(stats.averageWageValue)}`;
      averageWageRate.textContent = `$${stats.averageWageHourly}/hr`;
      readingValue.title = `Estimated from page counts at ${stats.readingPagesPerHour} pages/hour`;
      minimumWageValue.title = stats.wageSources.minimumWage;
      averageWageValue.title = `${stats.wageSources.averageWage}; published ${stats.wageSources.averageWagePublished}`;
    }

    function renderMonth(dateString) {
      if (!dateString) return '';
      return monthFormatter.format(new Date(`${dateString}T00:00:00Z`));
    }

    function sortItems(collection) {
      return collection
        .map((item, index) => ({ item, index }))
        .sort((left, right) => {
          const leftDate = left.item.date_read || '';
          const rightDate = right.item.date_read || '';
          const leftHasDiaryDate = left.item.type !== 'movie' || Boolean(leftDate);
          const rightHasDiaryDate = right.item.type !== 'movie' || Boolean(rightDate);

          if (leftHasDiaryDate !== rightHasDiaryDate) {
            return Number(rightHasDiaryDate) - Number(leftHasDiaryDate);
          }

          if (leftDate !== rightDate) {
            return rightDate.localeCompare(leftDate);
          }

          if (left.item.ya !== right.item.ya) {
            return Number(left.item.ya) - Number(right.item.ya);
          }

          return left.index - right.index;
        })
        .map(({ item }) => item);
    }

    function isJapaneseLanguageItem(item) {
      if (item.type === 'book') {
        return item.id.startsWith('bm-');
      }

      if (item.type === 'movie') {
        return JAPANESE_MOVIE_IDS.has(item.id);
      }

      if (item.type === 'anime') {
        return true;
      }

      return false;
    }

    const FAVORITE_BOOK_IDS = new Set([
      'bm-578733',     // 仮面の告白 (Confessions of a Mask)
      'gr-12079',      // Ludwig Wittgenstein: The Duty of Genius
      'gr-145660',     // The Captive Mind
      'gr-12749',      // Swann's Way
      'gr-16158559',   // Undisputed Truth (Mike Tyson)
      'gr-17571564',   // Hyperbole and a Half
      'gr-1260022',    // The Ancient City
      'gr-4671',       // The Great Gatsby
      'gr-49455',      // Notes from Underground
    ]);

    function isFavoriteItem(item) {
      if (item.type === 'movie') {
        return Number(item.rating) === 5;
      }

      if (item.type === 'book') {
        return FAVORITE_BOOK_IDS.has(item.id);
      }

      return false;
    }

    function render(filter = activeFilter, view = activeView, language = activeLanguage, favorites = activeFavorites) {
      activeFilter = filter;
      activeView = view;
      activeLanguage = language;
      activeFavorites = favorites;
      const effectiveView = activeLayout === 'full' ? 'timeline' : view;

      const grid = document.getElementById('grid');
      const filtered = siteItems.filter((item) => {
        if (filter !== 'all' && item.type !== filter) {
          return false;
        }

        if (language === 'japanese' && !isJapaneseLanguageItem(item)) {
          return false;
        }

        if (language === 'english' && isJapaneseLanguageItem(item)) {
          return false;
        }

        if (favorites === 'favorites' && !isFavoriteItem(item)) {
          return false;
        }

        if (activeSearch) {
          const q = activeSearch.toLowerCase();
          if (!item.title.toLowerCase().includes(q) && !item.author.toLowerCase().includes(q)) {
            return false;
          }
        }

        return true;
      });
      const sorted = sortItems(filtered);

      document.getElementById('count').textContent = `${sorted.length} titles`;

      if (effectiveView === 'month') {
        let previousMonth = '';
        const fragments = [];

        sorted.forEach(item => {
          const currentMonth = renderMonth(item.date_read) || 'Undated';
          if (currentMonth !== previousMonth) {
            fragments.push(`<div class="month-marker">${currentMonth}</div>`);
            previousMonth = currentMonth;
          }

          const img = item.cover
            ? `<img src="${item.cover}" alt="${item.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="no-cover" style="display:none">${item.title}</div>`
            : `<div class="no-cover">${item.title}</div>`;
          const liked = isFavoriteItem(item);
          fragments.push(`
          <div class="entry">
            <div class="item" title="${item.title} — ${item.author}">
              ${liked ? '<span class="liked-heart">\u2665</span>' : ''}
              ${img}
              <div class="overlay">
                <span class="title">${item.title}</span>
                <span class="author">${item.author}</span>
                ${item.date_read ? `<span class="date">${item.date_read}</span>` : ''}
              </div>
            </div>
          </div>
        `);
        });

        grid.innerHTML = fragments.join('');
      } else {
        grid.innerHTML = sorted.map(item => {
          const img = item.cover
            ? `<img src="${item.cover}" alt="${item.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="no-cover" style="display:none">${item.title}</div>`
            : `<div class="no-cover">${item.title}</div>`;
          const liked = isFavoriteItem(item);
          return `
          <div class="entry">
            <div class="item" title="${item.title} — ${item.author}">
              ${liked ? '<span class="liked-heart">\u2665</span>' : ''}
              ${img}
              <div class="overlay">
                <span class="title">${item.title}</span>
                <span class="author">${item.author}</span>
                ${item.date_read ? `<span class="date">${item.date_read}</span>` : ''}
              </div>
            </div>
          </div>
        `;
        }).join('');
      }
    }

    document.querySelectorAll('.filters button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        gtag('event', 'filter_change', { filter_type: 'show', filter_value: btn.dataset.filter });
        render(btn.dataset.filter, activeView, activeLanguage, activeFavorites);
      });
    });

    document.querySelectorAll('.view-toggle button').forEach(btn => {
      if (btn.dataset.view === activeView) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem(STORAGE_KEY, btn.dataset.view);
        gtag('event', 'filter_change', { filter_type: 'view', filter_value: btn.dataset.view });
        render(activeFilter, btn.dataset.view, activeLanguage, activeFavorites);
      });
    });

    document.querySelectorAll('.layout-toggle button').forEach(btn => {
      const isActive = btn.dataset.layout === activeLayout;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-pressed', String(isActive));

      btn.addEventListener('click', () => {
        const nextLayout = activeLayout === btn.dataset.layout ? 'default' : btn.dataset.layout;
        localStorage.setItem(LAYOUT_STORAGE_KEY, nextLayout);
        document.querySelectorAll('.layout-toggle button').forEach(button => {
          button.classList.remove('active');
          button.setAttribute('aria-pressed', 'false');
        });
        const nextActive = nextLayout === btn.dataset.layout;
        btn.classList.toggle('active', nextActive);
        btn.setAttribute('aria-pressed', String(nextActive));
        gtag('event', 'filter_change', { filter_type: 'mode', filter_value: nextLayout });
        applyLayout(nextLayout);
        render(activeFilter, activeView, activeLanguage, activeFavorites);
      });
    });

    document.getElementById('fullscreen-exit').addEventListener('click', () => {
      activeLayout = 'default';
      localStorage.setItem(LAYOUT_STORAGE_KEY, activeLayout);
      document.querySelectorAll('.layout-toggle button').forEach(button => {
        button.classList.remove('active');
        button.setAttribute('aria-pressed', 'false');
      });
      applyLayout(activeLayout);
      render(activeFilter, activeView, activeLanguage, activeFavorites);
    });

    ['mousemove', 'mousedown', 'touchstart', 'touchmove', 'wheel', 'scroll', 'keydown'].forEach(eventName => {
      document.addEventListener(eventName, bumpFullscreenExitVisibility, { passive: true });
    });

    const exitBtn = document.getElementById('fullscreen-exit');
    setInterval(() => {
      if (activeLayout === 'full' && document.body.classList.contains('idle-ui')) {
        exitBtn.classList.remove('nudge');
        void exitBtn.offsetWidth;
        exitBtn.classList.add('nudge');
      }
    }, 10000);

    document.querySelectorAll('.language-toggle button').forEach(btn => {
      if (btn.dataset.language === activeLanguage) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      btn.addEventListener('click', () => {
        document.querySelectorAll('.language-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem(LANGUAGE_STORAGE_KEY, btn.dataset.language);
        gtag('event', 'filter_change', { filter_type: 'language', filter_value: btn.dataset.language });
        render(activeFilter, activeView, btn.dataset.language, activeFavorites);
      });
    });

    document.querySelectorAll('.favorites-toggle button').forEach(btn => {
      if (btn.dataset.favorites === activeFavorites) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }

      btn.addEventListener('click', () => {
        document.querySelectorAll('.favorites-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        localStorage.setItem(FAVORITES_STORAGE_KEY, btn.dataset.favorites);
        gtag('event', 'filter_change', { filter_type: 'focus', filter_value: btn.dataset.favorites });
        render(activeFilter, activeView, activeLanguage, btn.dataset.favorites);
      });
    });

    // Scroll depth tracking
    const scrollMilestones = new Set();
    window.addEventListener('scroll', () => {
      const scrollPct = Math.round(
        (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100
      );
      [25, 50, 75, 100].forEach(milestone => {
        if (scrollPct >= milestone && !scrollMilestones.has(milestone)) {
          scrollMilestones.add(milestone);
          gtag('event', 'scroll_depth', { depth_percent: milestone });
        }
      });
    }, { passive: true });

    const searchInput = document.getElementById('search-input');
    const searchTrigger = document.getElementById('search-trigger');

    searchTrigger.addEventListener('click', () => {
      searchInput.style.width = '140px';
      searchInput.style.opacity = '1';
      searchInput.focus();
    });

    searchInput.addEventListener('input', () => {
      activeSearch = searchInput.value.trim();
      searchInput.classList.toggle('has-value', activeSearch.length > 0);
      render();
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        activeSearch = '';
        searchInput.value = '';
        searchInput.classList.remove('has-value');
        searchInput.blur();
        render();
      }
    });

    searchInput.addEventListener('blur', () => {
      if (!activeSearch) {
        searchInput.style.width = '';
        searchInput.style.opacity = '';
      }
    });

    const chaconneAudio = document.getElementById('chaconne');
    const musicBtn = document.getElementById('music-btn');
    const CHACONNE_DURATION = 1077;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const gainNode = audioCtx.createGain();
    const source = audioCtx.createMediaElementSource(chaconneAudio);
    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    gainNode.gain.value = 1;

    musicBtn.addEventListener('click', () => {
      if (!chaconneAudio.paused) {
        chaconneAudio.pause();
        chaconneAudio.currentTime = 0;
        musicBtn.classList.remove('playing');
      } else {
        chaconneAudio.currentTime = Math.random() * CHACONNE_DURATION * 0.85;
        gainNode.gain.value = 1;
        chaconneAudio.volume = 1;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        chaconneAudio.play();
        musicBtn.classList.add('playing');
      }
    });

    chaconneAudio.addEventListener('ended', () => {
      musicBtn.classList.remove('playing');
    });

    renderHeaderStats();
    applyLayout(activeLayout);
    render(activeFilter, activeView, activeLanguage, activeFavorites);
  </script>
</body>
</html>
