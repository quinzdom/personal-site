name: Import Bookmeter

on:
  schedule:
    - cron: '0 3 * * 0'  # Sunday 03:00 UTC = Sunday noon Asia/Tokyo
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Bookmeter import
        run: node scripts/import-bookmeter-read-list.mjs

      - name: Commit and push if books were added
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add items_data.js images/covers/
          if git diff --cached --quiet; then
            echo "No new books, nothing to commit."
          else
            git commit -m "Import new books from Bookmeter"
            git push
          fi
